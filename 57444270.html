<!DOCTYPE html>

<head>

<title>NAYIBIS SIERRA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#e8f0fe;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
.card{background:white;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.15);max-width:400px;width:100%;overflow:hidden}
.header{background:linear-gradient(135deg,#0d2b6e,#1565c0);padding:28px 20px;text-align:center}
.avatar{width:64px;height:64px;background:rgba(255,255,255,0.2);border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:30px}
.nombre{color:white;font-size:20px;font-weight:700;line-height:1.2}
.asoc{color:#90caf9;font-size:13px;margin-top:6px}
.badge{display:inline-block;background:#43a047;color:white;font-size:11px;padding:4px 14px;border-radius:20px;margin-top:10px;font-weight:600;letter-spacing:0.5px}
.body{padding:20px}
.item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f5}
.item:last-child{border-bottom:none}
.ico{font-size:20px;margin-right:14px;min-width:26px;text-align:center}
.lbl{font-size:10px;color:#9e9e9e;text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
.val{font-size:15px;color:#212121;font-weight:700;margin-top:2px}
.footer{background:#f5f5f5;padding:12px;text-align:center;font-size:10px;color:#bbb;letter-spacing:0.3px}
</style>
</head>
<body>
<div class="card">

  </div>
  <div class="body">
    <div class="item"><div class="ico">🆔</div><div><div class="lbl">Cédula de Ciudadanía</div><div class="val">57444270</div></div></div>
    <div class="item"><div class="ico">💼</div><div><div class="lbl">Actividad Económica</div><div class="val">IMPLEMENTOS DE PLAYA</div></div></div>
    <div class="item"><div class="ico">📍</div><div><div class="lbl">Lugar de Actividad</div><div class="val">Camellon Taganga</div></div></div>
